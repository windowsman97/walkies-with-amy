<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Blog | Walkies With Amy</title>
  <meta name="description" content="Tips, advice and updates from Walkies With Amy in Leeds." />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐾</text></svg>">
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>

<header class="header">
  <div class="container header-inner">
    <a class="logo" href="/">
      <span class="logo-badge">🐾</span>
      <span>Walkies With Amy</span>
    </a>
    <button class="nav-toggle" aria-label="Open menu" aria-expanded="false" aria-controls="main-nav">
      <span></span><span></span><span></span>
    </button>
    <nav class="nav" id="main-nav">
      <a href="/">Home</a>
      <a href="/services.html">Services</a>
      <a href="/about.html">About</a>
      <a class="btn primary" href="/contact.html">Contact</a>
    </nav>
  </div>
</header>

<main>
  <section class="section">
    <div class="container">
      <span class="kicker">Leeds, UK</span>
      <h1 class="h1">Walkies With Amy Blog</h1>
      <p class="lead">
        Tips, advice and updates about dog walking and pet care in Leeds.
      </p>

      <div id="blog-spinner" class="loading-spinner" style="margin-top:30px;"><div class="spinner"></div></div>
      <div id="blog-list" class="grid3" style="margin-top:30px;"></div>
    </div>
  </section>
</main>

<footer class="footer">
  <div class="container small">
    © <span id="year"></span> Walkies With Amy • Leeds, UK •
    <a href="/contact.html">Contact</a>
  </div>
</footer>

<script>
document.getElementById("year").textContent = new Date().getFullYear();

/* HAMBURGER NAV */
(function () {
  const toggle = document.querySelector(".nav-toggle");
  const nav = document.querySelector(".nav");
  toggle?.addEventListener("click", () => {
    const open = nav.classList.toggle("open");
    toggle.classList.toggle("open", open);
    toggle.setAttribute("aria-expanded", open);
    toggle.setAttribute("aria-label", open ? "Close menu" : "Open menu");
  });
})();

async function loadBlog() {
  const spinner = document.getElementById("blog-spinner");
  const container = document.getElementById("blog-list");
  try {
    const res = await fetch("/api");
    const data = await res.json();
    spinner.remove();

    if (!data.results || !data.results.length) {
      container.innerHTML = "<p>No blog posts yet.</p>";
      return;
    }

    data.results.forEach(post => {
      const title = post.properties.Name.title[0]?.plain_text || "Untitled";
      const excerpt = post.properties.Excerpt.rich_text[0]?.plain_text || "";
      const slug = post.properties.Slug.rich_text[0]?.plain_text || "";

      const card = document.createElement("div");
      card.className = "card service";

      const h3 = document.createElement("h3");
      h3.textContent = title;

      const p = document.createElement("p");
      p.textContent = excerpt;

      const a = document.createElement("a");
      a.href = "/post.html?slug=" + encodeURIComponent(slug);
      a.className = "btn primary";
      a.textContent = "Read more";

      card.append(h3, p, a);
      container.appendChild(card);
    });

  } catch (err) {
    spinner.remove();
    console.error("Blog load error:", err);
    const errP = document.createElement("p");
    errP.textContent = "Unable to load blog posts.";
    container.appendChild(errP);
  }
}

loadBlog();
</script>

</body>
</html>
