<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Post | Walkies With Amy</title>
  <meta name="description" content="Dog walking and pet care tips and updates from Walkies With Amy in Leeds." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐾</text></svg>">
  <meta property="og:type" content="article" />
  <meta property="og:site_name" content="Walkies With Amy" />
  <meta property="og:image" content="https://walkieswithamy.co.uk/images/gallery-1.jpg" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>

<header class="header">
  <div class="container header-inner">
    <a class="logo" href="/index.html">
      <span class="logo-badge">🐾</span>
      <span>Walkies With Amy</span>
    </a>
    <button class="nav-toggle" aria-label="Open menu" aria-expanded="false" aria-controls="main-nav">
      <span></span><span></span><span></span>
    </button>
    <nav class="nav" id="main-nav">
      <a href="/index.html">Home</a>
      <a href="/services.html">Services</a>
      <a href="/about.html">About</a>
      <a href="https://www.instagram.com/firthamylouise/" target="_blank" rel="noopener noreferrer">Instagram</a>
      <a class="btn primary" href="/contact.html">Contact</a>
    </nav>
  </div>
</header>

<main>
  <section class="section">
    <div class="container">

      <h1 id="post-title" class="h1"></h1>
      <p id="post-date" class="note" style="margin-bottom:30px;"></p>

      <div id="post-content"></div>

    </div>
  </section>
</main>

<footer class="footer">
  <div class="container small">
    © <span id="year"></span> Walkies With Amy • Leeds, UK •
    <a href="/contact.html">Contact</a>
  </div>
</footer>

<script>
document.getElementById("year").textContent = new Date().getFullYear();

(function () {
  const toggle = document.querySelector(".nav-toggle");
  const nav = document.querySelector(".nav");
  toggle?.addEventListener("click", () => {
    const open = nav.classList.toggle("open");
    toggle.classList.toggle("open", open);
    toggle.setAttribute("aria-expanded", open);
    toggle.setAttribute("aria-label", open ? "Close menu" : "Open menu");
  });
})();

async function loadPost() {
  try {
    const params = new URLSearchParams(window.location.search);
    const slug = params.get("slug");
    if (!slug) return;

    const res = await fetch(`/api?slug=${slug}`);
    const data = await res.json();

    if (!data.post) {
      document.getElementById("post-title").textContent = "Post not found";
      return;
    }

    const post = data.post;
    const blocks = data.blocks || [];

    // Title
    document.getElementById("post-title").textContent =
      post.properties.Name.title[0]?.plain_text || "";

    // Date
    document.getElementById("post-date").textContent =
      post.properties.Date.date?.start || "";

    const content = document.getElementById("post-content");

    blocks.forEach(block => {

      // Paragraphs
      if (block.type === "paragraph") {
        const text = block.paragraph.rich_text
          .map(t => t.plain_text)
          .join("");

        if (text.trim()) {
          const p = document.createElement("p");
          p.textContent = text;
          p.style.marginBottom = "16px";
          content.appendChild(p);
        }
      }

      // Images
      if (block.type === "image") {
        const imageUrl =
          block.image.file?.url ||
          block.image.external?.url;

        if (imageUrl) {
          const img = document.createElement("img");
          img.src = imageUrl;
          img.style.maxWidth = "100%";
          img.style.borderRadius = "16px";
          img.style.margin = "25px 0";
          content.appendChild(img);
        }
      }

      // Headings
      if (block.type === "heading_1") {
        const text = block.heading_1.rich_text
          .map(t => t.plain_text)
          .join("");

        const h1 = document.createElement("h2");
        h1.textContent = text;
        h1.style.marginTop = "30px";
        content.appendChild(h1);
      }

      if (block.type === "heading_2") {
        const text = block.heading_2.rich_text
          .map(t => t.plain_text)
          .join("");

        const h2 = document.createElement("h3");
        h2.textContent = text;
        h2.style.marginTop = "25px";
        content.appendChild(h2);
      }
    });

  } catch (err) {
    console.error(err);
  }
}

loadPost();
</script>

</body>
</html>
